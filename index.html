<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Prayer Wall</title>
<style>
  /* =====================================================================
     PRAYER WALL — prototype
     A single HTML file: markup is built by JS, styling lives here, all
     "data" lives in an in-memory JS object and resets on page reload.
     Every spot a real backend belongs is marked  /* BACKEND: */  so this
     can be wired to Supabase / Firebase / Postgres / a moderation API /
     real auth / a shared database without restructuring the UI.

     NOTE ON SCALE: this prototype keeps everything in one visitor's
     browser memory. Since the goal is a site "many" people use, the
     prayer count, wall contents, etc. need to live in a real shared
     database so every visitor sees the same wall — see BACKEND notes
     throughout for exactly where those calls go.
     ===================================================================== */

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root[data-theme="light"] {
    --bg: #FFF3DF;
    --bg-panel: #FFFFFF;
    --bg-panel-2: #FFEEDA;
    --text: #3A2C1E;
    --text-muted: #9C8060;
    --gold: #C9762E;          /* warm honey — primary accent (prayer) */
    --gold-soft: rgba(201, 118, 46, 0.20);
    --rose: #B15F73;          /* dusty bloom — secondary accent (praise) */
    --rose-soft: rgba(177, 95, 115, 0.16);
    --divider: rgba(196, 120, 58, 0.38);
    --danger: #A94F3B;
    --shadow: 0 2px 6px rgba(196,120,58,0.10), 0 14px 32px rgba(196,120,58,0.14);
  }

  :root[data-theme="dark"] {
    --bg: #12162A;
    --bg-panel: #1B2038;
    --bg-panel-2: #232A48;
    --text: #F3EEE3;
    --text-muted: #9AA2C4;
    --gold: #E4B15E;
    --gold-soft: rgba(228, 177, 94, 0.14);
    --rose: #D98E85;
    --rose-soft: rgba(217, 142, 133, 0.14);
    --divider: rgba(243, 238, 227, 0.10);
    --danger: #C96A5E;
    --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at 12% -12%, rgba(255, 154, 74, 0.52), rgba(255, 154, 74, 0) 50%),
      linear-gradient(180deg, #FFDFB3 0%, #FFE3BD 20%, #FFE8C9 40%, #FFF0DA 62%, #FFF6E9 80%, #FFFBF5 92%, #FFFFFF 100%);
    color: var(--text);
    min-height: 100vh;
    transition: background 260ms ease, color 260ms ease;
  }
  html[data-theme="dark"] body {
    background: var(--bg);
    background-attachment: initial;
  }
  .pw-serif { font-family: 'Fraunces', serif; }
  .pw-mono { font-family: 'IBM Plex Mono', monospace; }

  .pw-shell {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding: 24px 20px 56px;
  }

  .pw-topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .pw-theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--divider);
    background: var(--bg-panel);
    color: var(--text-muted);
    cursor: pointer;
    transition: color 160ms ease, border-color 160ms ease;
  }
  .pw-theme-toggle:hover { color: var(--gold); border-color: var(--gold); }

  .pw-fade-enter { animation: pwFadeIn 700ms ease both; }
  @keyframes pwFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pw-ember-wrap { position: relative; display: inline-flex; flex-direction: column; align-items: center; }
  .pw-ember-glow {
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle, var(--gold-soft) 0%, rgba(0,0,0,0) 70%);
    filter: blur(2px);
    animation: pwEmberPulse 3.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pwEmberPulse {
    0%, 100% { opacity: 0.5; transform: scale(0.96); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .pw-wick {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0;
    color: var(--text-muted);
    font-size: 11px;
  }
  .pw-wick::before, .pw-wick::after { content: ""; flex: 1; height: 1px; background: var(--divider); }

  .pw-card {
    background: var(--bg-panel);
    border: 1.5px solid var(--divider);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
  }
  html[data-theme="dark"] .pw-card { border-width: 1px; }

  .pw-section-card {
    border: 1.5px solid rgba(196, 120, 58, 0.34);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.42);
    padding: 13px;
    box-shadow: 0 8px 20px rgba(196,120,58,0.08);
  }
  html[data-theme="dark"] .pw-section-card {
    background: rgba(27, 32, 56, 0.38);
    border-color: var(--divider);
    box-shadow: var(--shadow);
  }
  .pw-section-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-bottom: 10px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .pw-stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }
  .pw-stat-tile {
    padding: 10px 4px !important;
    background: rgba(255, 238, 218, 0.78) !important;
    border-color: rgba(196, 120, 58, 0.32) !important;
    box-shadow: none;
  }
  html[data-theme="dark"] .pw-stat-tile {
    background: var(--bg-panel-2) !important;
    border-color: var(--divider) !important;
  }
  .pw-board-card {
    border-color: rgba(196, 120, 58, 0.34) !important;
    background: rgba(255, 255, 255, 0.74);
  }
  html[data-theme="dark"] .pw-board-card { background: var(--bg-panel); }

  .pw-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    padding: 15px 18px;
    border-radius: 14px;
    font-size: 15.5px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform 140ms ease, opacity 140ms ease, background 140ms ease, border-color 140ms ease;
  }
  .pw-btn:active { transform: scale(0.98); }
  .pw-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .pw-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .pw-btn-auto { width: auto; padding: 9px 12px; font-size: 13px; }

  .pw-btn-primary {
    background: #B96520;
    color: #241505;
    border-color: rgba(139, 72, 24, 0.34);
    box-shadow: 0 10px 22px rgba(201,118,46,0.24);
    font-weight: 600;
  }
  :root[data-theme="dark"] .pw-btn-primary {
    background: var(--gold);
    color: #221606;
    border-color: transparent;
    box-shadow: none;
  }
  .pw-btn-primary:hover:not(:disabled) { opacity: 0.92; }

  .pw-btn-outline { background: transparent; border-color: var(--divider); color: var(--text); }
  .pw-btn-outline:hover { border-color: var(--gold); }

  .pw-btn-quiet { background: var(--bg-panel-2); color: var(--text); border-color: var(--divider); }
  .pw-btn-quiet:hover { filter: brightness(0.97); }
  :root[data-theme="dark"] .pw-btn-quiet:hover { filter: brightness(1.15); }

  .pw-btn-danger { background: transparent; border-color: rgba(177, 90, 70, 0.4); color: var(--danger); }

  .pw-input, .pw-textarea {
    width: 100%;
    background: var(--bg-panel-2);
    border: 1px solid var(--divider);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
  }
  .pw-input:focus, .pw-textarea:focus { outline: none; border-color: var(--gold); }
  .pw-textarea { resize: vertical; min-height: 120px; line-height: 1.5; }

  .pw-crossfade { animation: pwCross 650ms ease both; }
  @keyframes pwCross {
    from { opacity: 0; transform: scale(0.985); }
    to { opacity: 1; transform: scale(1); }
  }

  .pw-footer-link {
    color: var(--text-muted);
    font-size: 12.5px;
    background: none;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    opacity: 0.75;
    font-family: inherit;
  }
  .pw-footer-link:hover { opacity: 1; color: var(--text); }

  .pw-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .pw-scroll-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .pw-scroll-row::-webkit-scrollbar { height: 4px; }

  .pw-report-pop {
    position: absolute;
    bottom: 24px;
    left: 0;
    z-index: 5;
    min-width: 190px;
    padding: 8px;
  }
  .pw-report-pop button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 8px 6px;
    cursor: pointer;
    border-radius: 8px;
  }
  .pw-report-pop button:hover { background: var(--bg-panel-2); }

  ::selection { background: var(--gold-soft); }

  @media (prefers-reduced-motion: reduce) {
    .pw-fade-enter, .pw-crossfade, .pw-ember-glow { animation: none !important; }
  }

  svg.pw-icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ==========================================================================
   CONFIG
   ========================================================================== */

// BACKEND: never hardcode an admin password in shipped code. Replace with
// real auth (a session cookie issued by your server, Supabase Auth, SSO…).
const ADMIN_PASSWORD = "prayerwall2026";

const PRAYER_EXPIRY_DAYS = 90;
const PRAISE_EXPIRY_DAYS = 100;
const AUTO_HIDE_REPORT_THRESHOLD = 3;
const ROTATE_MS = 6500;
const DAY_MS = 24 * 60 * 60 * 1000;

// BACKEND: replace with a real moderation pipeline (OpenAI Moderation API,
// Perspective API, or a custom classifier running server-side on submit).
// This word list is only a placeholder so the prototype has *some*
// branching behavior between active / pending / rejected.
const BLOCKED_WORDS = ["hate you", "slur-placeholder", "kill them"];
const FLAG_WORDS = ["http://", "https://", "call me at", "my number is", "suicide", "want to die"];

function moderate(text) {
  const lower = text.toLowerCase();
  if (BLOCKED_WORDS.some((w) => lower.includes(w))) return { status: "rejected", reason: "blocked-term" };
  if (FLAG_WORDS.some((w) => lower.includes(w)) || text.trim().length > 600) return { status: "pending", reason: "needs-review" };
  return { status: "active", reason: null };
}

/* ==========================================================================
   HELPERS
   ========================================================================== */

let idCounter = 1000;
function uid(prefix) {
  idCounter += 1;
  return prefix + "_" + idCounter + "_" + Math.random().toString(36).slice(2, 7);
}
function daysAgo(n) { return Date.now() - n * DAY_MS; }
function daysFromNow(n, from) { return (from || Date.now()) + n * DAY_MS; }

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins <= 1 ? "just now" : mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + "d ago";
  return Math.floor(days / 30) + "mo ago";
}
function formatDate(ts) {
  return new Date(ts).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// Reads an NFC tag id from the URL, e.g. /?t=AB42K9 or /pray?t=AB42K9.
// BACKEND: forward this same tag id with every submission, prayer action,
// and report so abuse from one physical tag/kiosk can be traced without
// identifying any individual person.
function getTagFromUrl() {
  try {
    return new URLSearchParams(window.location.search).get("t") || null;
  } catch (e) {
    return null;
  }
}

// BACKEND: in production, a scheduled job (cron / edge function) flips
// status to "expired" in the database on a timer. Here we just compute it
// on the fly so the prototype doesn't need a background worker.
function effectiveStatus(post) {
  if (post.status === "active" && post.expires_at < Date.now()) return "expired";
  return post.status;
}

/* ==========================================================================
   ICONS — small inline SVGs so this file has zero external icon dependency
   ========================================================================== */

const ICONS = {
  heart: '<path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.8 0-3 .5-4.5 2-1.5-1.5-2.7-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7Z"/>',
  send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
  sparkles: '<path d="M12 3v5M12 16v5M3 12h5M16 12h5M6 6l3 3M15 15l3 3M18 6l-3 3M9 15l-3 3"/>',
  shield: '<path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6Z"/><path d="m9 12 2 2 4-4"/>',
  flag: '<path d="M4 3v18"/><path d="M4 4h11l-1.5 4L15 12H4"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  x: '<path d="M18 6 6 18"/><path d="M6 6l12 12"/>',
  lock: '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
  search: '<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
  chevronRight: '<path d="m9 6 6 6-6 6"/>',
  arrowLeft: '<path d="M19 12H5"/><path d="m11 18-6-6 6-6"/>',
  rotateCcw: '<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',
  trash: '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
  eyeOff: '<path d="M2 12s3-7 10-7c1.4 0 2.6.3 3.7.7M22 12s-1.2 2.7-3.4 4.6M9.9 9.9a3 3 0 0 0 4.2 4.2"/><path d="M2 2l20 20"/><path d="M14.1 14.1C13 15 10 16 6.3 15.6"/>',
  eye: '<path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8Z"/><circle cx="12" cy="12" r="3"/>',
  calendarPlus: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M12 14v6M9 17h6"/>',
  sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  moon: '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>',
  flame: '<path d="M12 2c1 3-2 4.5-2 7.5A4 4 0 0 0 14 14c1.8-.6 2-2.3 1.8-3.5.9 1 1.7 2.5 1.7 4a5.5 5.5 0 0 1-11 0c0-3.5 3-4.8 2-9.5Z"/>'
};
function icon(name, size, color) {
  size = size || 16;
  const stroke = color || "currentColor";
  return '<svg class="pw-icon" xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size +
    '" viewBox="0 0 24 24" fill="none" stroke="' + stroke +
    '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[name] || "") + '</svg>';
}

/* ==========================================================================
   SEED DATA (mock database — see BACKEND notes for the real schema)
   ==========================================================================
   posts:          id, type, body, display_name, status, prayed_count,
                   report_count, tag_id, ip_hash, device_hash,
                   moderation_reason, created_at, expires_at, updated_at
   prayer_actions: id, post_id, tag_id, ip_hash, device_hash, created_at
   reports:        id, post_id, reason, tag_id, ip_hash, created_at
   ========================================================================== */

function seedPosts() {
  const prayers = [
    "Please pray for my mom's surgery next week. She's scared and so am I.",
    "Praying for peace in my house. My parents are fighting a lot lately.",
    "I'm about to start a new job and I'm anxious I won't be good enough.",
    "My grandfather is in hospice. Pray our family finds comfort these last days.",
    "I've been struggling with anxiety at school. Ask God to give me peace.",
    "Pray for my friend who's overseas serving right now, that they'd stay safe.",
    "I lost my job this week. Praying for provision and the right next door.",
    "My marriage has been hard lately. Pray for patience and for us to listen better.",
    "Please pray for a friend going through chemo. She's tired but staying hopeful.",
    "I'm far from home for college and feeling really lonely this semester."
  ];
  const praises = [
    "My biopsy came back clear. Thank you all for praying — God is good.",
    "I got the job! After months of searching, a door finally opened.",
    "My son and I finally had the conversation we'd been avoiding for years.",
    "We welcomed our daughter home from the NICU today, healthy and strong.",
    "I've been sober 90 days. Never thought I'd say that. Thank you for praying.",
    "Reconciled with my sister after three years of silence. Grateful doesn't cover it."
  ];

  const posts = [];
  prayers.forEach((body, i) => {
    const created = daysAgo(i * 2 + 1);
    posts.push({
      id: uid("post"), type: "prayer", body,
      display_name: i % 3 === 0 ? "Anonymous" : null,
      status: "active", prayed_count: Math.floor(Math.random() * 40), report_count: 0,
      tag_id: i % 4 === 0 ? "AB42K9" : null,
      ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: null,
      created_at: created, expires_at: daysFromNow(PRAYER_EXPIRY_DAYS, created), updated_at: created
    });
  });
  praises.forEach((body, i) => {
    const created = daysAgo(i * 3 + 2);
    posts.push({
      id: uid("post"), type: "praise", body,
      display_name: null, status: "active", prayed_count: 0, report_count: 0,
      tag_id: null, ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: null,
      created_at: created, expires_at: daysFromNow(PRAISE_EXPIRY_DAYS, created), updated_at: created
    });
  });

  posts.push({
    id: uid("post"), type: "prayer",
    body: "Pray for my cousin, waiting on test results, call me at 555-0142 if you feel led.",
    display_name: null, status: "pending", prayed_count: 0, report_count: 0,
    tag_id: null, ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: "needs-review",
    created_at: daysAgo(0.2), expires_at: daysFromNow(PRAYER_EXPIRY_DAYS, daysAgo(0.2)), updated_at: daysAgo(0.2)
  });
  posts.push({
    id: uid("post"), type: "prayer", body: "This community is fake and I hate you all.",
    display_name: null, status: "rejected", prayed_count: 0, report_count: 0,
    tag_id: null, ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: "blocked-term",
    created_at: daysAgo(0.4), expires_at: daysFromNow(PRAYER_EXPIRY_DAYS, daysAgo(0.4)), updated_at: daysAgo(0.4)
  });
  posts.push({
    id: uid("post"), type: "praise",
    body: "An old praise report, long since expired, kept for admin demo purposes.",
    display_name: null, status: "active", prayed_count: 0, report_count: 1,
    tag_id: null, ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: null,
    created_at: daysAgo(150), expires_at: daysAgo(20), updated_at: daysAgo(150)
  });
  posts.push({
    id: uid("post"), type: "prayer",
    body: "Reported example: pray this gets reviewed by an admin soon.",
    display_name: null, status: "hidden", prayed_count: 3, report_count: 3,
    tag_id: "AB42K9", ip_hash: uid("iph"), device_hash: uid("devh"), moderation_reason: null,
    created_at: daysAgo(4), expires_at: daysFromNow(PRAYER_EXPIRY_DAYS, daysAgo(4)), updated_at: daysAgo(1)
  });

  return posts;
}

function seedPrayerActions(posts) {
  const actions = [];
  posts.filter((p) => p.type === "prayer").forEach((p) => {
    for (let i = 0; i < p.prayed_count; i++) {
      actions.push({
        id: uid("act"), post_id: p.id, tag_id: p.tag_id,
        ip_hash: uid("iph"), device_hash: uid("devh"),
        created_at: daysAgo(Math.random() * 200)
      });
    }
  });
  return actions;
}

/* ==========================================================================
   STATE
   ========================================================================== */

const state = {
  page: "home",
  posts: seedPosts(),
  prayerActions: [],
  reports: [],
  reportedIds: new Set(),
  adminAuthed: false,
  adminPasswordInput: "",
  adminError: false,
  adminTab: "active-prayer",
  adminSearch: "",
  theme: "light", // BACKEND/DEPLOY NOTE: on your real site (outside this
                  // preview) persist this with localStorage or a cookie so
                  // a visitor's choice sticks between visits. It's kept
                  // in-memory only here.
  boardIndex: 0,
  praiseBoardIndex: 0,
  prayScreen: { currentId: null, lastId: null, phase: "praying" },
  openReportMenu: null,
  formPrayerBody: "",
  formPrayerName: "",
  formPraiseBody: "",
  formPraiseName: "",
  submitResult: { prayer: null, praise: null }
};
state.prayerActions = seedPrayerActions(state.posts);

const tagId = getTagFromUrl();
const deviceHash = uid("devh"); // BACKEND: real IP/device hashing happens server-side.

// BACKEND: naive client-side placeholder only — real rate limiting must
// live server-side (edge middleware / API gateway / Redis token bucket)
// since client-side state can't be trusted.
const recentActionTimestamps = [];
function withinRateLimit() {
  const cutoff = Date.now() - 10000;
  while (recentActionTimestamps.length && recentActionTimestamps[0] <= cutoff) recentActionTimestamps.shift();
  if (recentActionTimestamps.length >= 8) return false;
  recentActionTimestamps.push(Date.now());
  return true;
}

/* ==========================================================================
   DERIVED DATA HELPERS
   ========================================================================== */

function activePrayers() {
  return state.posts.filter((p) => p.type === "prayer" && effectiveStatus(p) === "active");
}
function activePraises() {
  return state.posts.filter((p) => p.type === "praise" && effectiveStatus(p) === "active");
}
function boardAll() {
  return state.posts.filter((p) => effectiveStatus(p) === "active").sort((a, b) => b.created_at - a.created_at);
}
function computeStats() {
  const count = (since) => state.prayerActions.filter((a) => a.created_at >= since).length;
  return {
    today: count(daysAgo(1)),
    week: count(daysAgo(7)),
    month: count(daysAgo(30)),
    year: count(daysAgo(365)),
    lifetime: state.prayerActions.length
  };
}

const ADMIN_TABS = [
  { key: "active-prayer", label: "Active Prayers", filter: (p) => p.type === "prayer" && effectiveStatus(p) === "active" },
  { key: "active-praise", label: "Active Praises", filter: (p) => p.type === "praise" && effectiveStatus(p) === "active" },
  { key: "pending", label: "Pending", filter: (p) => effectiveStatus(p) === "pending" },
  { key: "reported", label: "Reported", filter: (p) => p.report_count > 0 && effectiveStatus(p) !== "deleted" },
  { key: "hidden", label: "Hidden", filter: (p) => effectiveStatus(p) === "hidden" },
  { key: "expired", label: "Expired", filter: (p) => effectiveStatus(p) === "expired" },
  { key: "deleted", label: "Deleted", filter: (p) => effectiveStatus(p) === "deleted" }
];

/* ==========================================================================
   ACTIONS (state mutations)
   ========================================================================== */

function navigate(page) {
  state.page = page;
  state.submitResult.prayer = null;
  state.submitResult.praise = null;
  if (page === "pray") pickRandomPrayer();
  render();
}

function toggleTheme() {
  state.theme = state.theme === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", state.theme);
  render();
}

function pickRandomPrayer() {
  const pool = activePrayers();
  if (pool.length === 0) { state.prayScreen.currentId = null; return; }
  const filtered = pool.filter((p) => p.id !== state.prayScreen.lastId);
  const list = filtered.length > 0 ? filtered : pool;
  const chosen = list[Math.floor(Math.random() * list.length)];
  state.prayScreen.lastId = chosen.id;
  state.prayScreen.currentId = chosen.id;
  state.prayScreen.phase = "praying";
}

function markPrayed(postId) {
  if (!withinRateLimit()) return;
  const post = state.posts.find((p) => p.id === postId);
  if (post) { post.prayed_count += 1; post.updated_at = Date.now(); }
  state.prayerActions.push({
    id: uid("act"), post_id: postId, tag_id: tagId,
    ip_hash: uid("iph"), device_hash: device_hash,
    created_at: Date.now()
  });
  state.prayScreen.phase = "thanks";
  render();
}

function submitPost(type) {
  const bodyKey = type === "prayer" ? "formPrayerBody" : "formPraiseBody";
  const nameKey = type === "prayer" ? "formPrayerName" : "formPraiseName";
  const body = (state[bodyKey] || "").trim();
  if (!body) return;
  const name = (state[nameKey] || "").trim();
  const { status, reason } = moderate(body);
  const expiryDays = type === "prayer" ? PRAYER_EXPIRY_DAYS : PRAISE_EXPIRY_DAYS;
  const now = Date.now();
  const post = {
    id: uid("post"), type, body, display_name: name || null, status,
    prayed_count: 0, report_count: 0, tag_id: tagId,
    ip_hash: uid("iph"), device_hash: device_hash, moderation_reason: reason,
    created_at: now, expires_at: daysFromNow(expiryDays, now), updated_at: now
  };
  state.posts.unshift(post);
  state[bodyKey] = "";
  state[nameKey] = "";
  state.submitResult[type] = { status };
  render();
}

function reportPost(postId, reason) {
  if (state.reportedIds.has(postId)) return;
  state.reports.push({ id: uid("rep"), post_id: postId, reason, tag_id: tagId, ip_hash: uid("iph"), created_at: Date.now() });
  state.reportedIds.add(postId);
  const post = state.posts.find((p) => p.id === postId);
  if (post) {
    post.report_count += 1;
    if (post.report_count >= AUTO_HIDE_REPORT_THRESHOLD && post.status === "active") post.status = "hidden";
    post.updated_at = Date.now();
  }
  state.openReportMenu = null;
  render();
}

function adminAction(postId, action) {
  const post = state.posts.find((p) => p.id === postId);
  if (!post) return;
  const now = Date.now();
  if (action === "approve") post.status = "active";
  else if (action === "hide") post.status = "hidden";
  else if (action === "restore") post.status = "active";
  else if (action === "delete") post.status = "deleted";
  else if (action === "extend") { post.expires_at += 30 * DAY_MS; if (post.status === "expired") post.status = "active"; }
  post.updated_at = now;
  render();
}

function tryAdminLogin() {
  if (state.adminPasswordInput === ADMIN_PASSWORD) {
    state.adminAuthed = true;
    state.adminError = false;
  } else {
    state.adminError = true;
  }
  render();
}

/* ==========================================================================
   RENDER — top bar, wick divider, cards
   ========================================================================== */

function topBar(title, showBack) {
  return (
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">' +
    (showBack
      ? '<button data-action="nav" data-page="home" aria-label="Go back" ' +
        'style="width:38px;height:38px;border-radius:10px;border:1px solid var(--divider);background:transparent;' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:var(--text);">' +
        icon("arrowLeft", 17) + '</button>'
      : "") +
    '<div class="pw-serif" style="font-size:22px;">' + escapeHtml(title) + '</div>' +
    '</div>'
  );
}

function reportControl(post) {
  const reported = state.reportedIds.has(post.id);
  if (reported) {
    return '<span class="pw-footer-link">' + icon("check", 12) + ' Reported</span>';
  }
  const open = state.openReportMenu === post.id;
  let html = '<div style="position:relative;">' +
    '<button class="pw-footer-link" data-action="toggle-report" data-id="' + post.id + '">' +
    icon("flag", 12) + ' Report</button>';
  if (open) {
    html += '<div class="pw-card pw-report-pop">' +
      ["Feels spammy", "Inappropriate", "Something else"].map((r) =>
        '<button data-action="report" data-id="' + post.id + '" data-reason="' + escapeHtml(r) + '">' + escapeHtml(r) + '</button>'
      ).join("") +
      '</div>';
  }
  html += '</div>';
  return html;
}

function rotatingBoardHtml(items, index, emptyLabel) {
  if (items.length === 0) {
    return '<div class="pw-card" style="text-align:center;color:var(--text-muted);font-size:14px;">' + escapeHtml(emptyLabel) + '</div>';
  }
  const post = items[index % items.length];
  const isPraise = post.type === "praise";
  let dots = "";
  if (items.length > 1) {
    dots = '<div style="display:flex;justify-content:center;gap:6px;margin-top:16px;">' +
      items.slice(0, 8).map((_, i) =>
        '<span style="width:5px;height:5px;border-radius:50%;background:' +
        (i === index % items.length ? "var(--gold)" : "var(--divider)") + ';"></span>'
      ).join("") + '</div>';
  }
  return (
    '<div class="pw-card pw-board-card" style="border-top:3px solid ' + (isPraise ? "var(--rose)" : "var(--gold)") + ';"><div class="pw-crossfade">' +
    '<div class="pw-tag" style="color:' + (isPraise ? "var(--rose)" : "var(--gold)") + ';margin-bottom:10px;">' +
    icon(isPraise ? "sparkles" : "heart", 12) + (isPraise ? " Praise report" : " Prayer request") + '</div>' +
    '<div class="pw-serif" style="font-size:16.5px;font-style:italic;line-height:1.6;min-height:78px;">' + escapeHtml(post.body) + '</div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;">' +
    '<span class="pw-footer-link">' + timeAgo(post.created_at) + '</span>' +
    reportControl(post) +
    '</div></div>' + dots + '</div>'
  );
}

function renderAdminDashboard() {
  const tabDef = ADMIN_TABS.find((t) => t.key === state.adminTab);
  let list = state.posts.filter(tabDef.filter);
  if (state.adminSearch.trim()) {
    const q = state.adminSearch.toLowerCase();
    list = list.filter((p) =>
      p.body.toLowerCase().includes(q) ||
      (p.tag_id || "").toLowerCase().includes(q) ||
      (p.display_name || "").toLowerCase().includes(q)
    );
  }
  list = list.slice().sort((a, b) => b.created_at - a.created_at);

  const tabsHtml = ADMIN_TABS.map((t) => {
    const activeTab = t.key === state.adminTab;
    const count = state.posts.filter(t.filter).length;
    return (
      '<button class="pw-mono" data-action="admin-tab" data-tab="' + t.key + '" style="flex-shrink:0;padding:8px 12px;border-radius:10px;font-size:11.5px;' +
      'border:1px solid var(--divider);cursor:pointer;white-space:nowrap;background:' +
      (activeTab ? "var(--gold-soft)" : "transparent") + ';color:' + (activeTab ? "var(--gold)" : "var(--text-muted)") + ';">' +
      escapeHtml(t.label) + ' · ' + count + '</button>'
    );
  }).join("");

  const listHtml = list.length === 0
    ? '<div class="pw-card" style="text-align:center;color:var(--text-muted);font-size:13.5px;">Nothing here.</div>'
    : list.map((p) => {
        const es = effectiveStatus(p);
        const actions = [];
        if (es === "pending") actions.push(['approve', 'check', 'Approve', 'pw-btn-primary']);
        if (es === "active") actions.push(['hide', 'eyeOff', 'Hide', 'pw-btn-outline']);
        if (es === "hidden") actions.push(['restore', 'eye', 'Restore', 'pw-btn-outline']);
        if (es === "active" || es === "expired") actions.push(['extend', 'calendarPlus', 'Extend 30d', 'pw-btn-outline']);
        if (es !== "deleted") actions.push(['delete', 'trash', 'Delete', 'pw-btn-danger']);
        if (es === "deleted") actions.push(['restore', 'rotateCcw', 'Restore', 'pw-btn-outline']);
        return (
          '<div class="pw-card">' +
          '<div class="pw-tag" style="color:' + (p.type === "praise" ? "var(--rose)" : "var(--gold)") + ';margin-bottom:8px;">' +
          icon(p.type === "praise" ? "sparkles" : "heart", 12) + ' ' + p.type + ' · ' + es + '</div>' +
          '<div style="font-size:14px;line-height:1.55;">' + escapeHtml(p.body) + '</div>' +
          '<div class="pw-mono" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:var(--text-muted);margin-top:12px;">' +
          '<div>tag: ' + (p.tag_id || "—") + '</div><div>reports: ' + p.report_count + '</div>' +
          '<div>created: ' + formatDate(p.created_at) + '</div><div>expires: ' + formatDate(p.expires_at) + '</div></div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;">' +
          actions.map(([action, ic, label, cls]) =>
            '<button class="pw-btn ' + cls + ' pw-btn-auto" data-action="admin-action" data-id="' + p.id + '" data-op="' + action + '">' +
            icon(ic, 14) + ' ' + label + '</button>'
          ).join("") +
          '</div></div>'
        );
      }).join("");

  return (
    '<div class="pw-fade-enter">' + topBar("Admin Dashboard", true) +
    '<div style="position:relative;margin-bottom:14px;">' +
    '<span style="position:absolute;left:12px;top:14px;color:var(--text-muted);">' + icon("search", 14) + '</span>' +
    '<input class="pw-input" id="admin-search-input" style="padding-left:34px;" placeholder="Search posts…" value="' + escapeHtml(state.adminSearch) + '" />' +
    '</div>' +
    '<div class="pw-scroll-row" style="margin-bottom:16px;">' + tabsHtml + '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px;">' + listHtml + '</div>' +
    '</div>'
  );
}

function renderPage() {
  switch (state.page) {
    case "home": return renderHome();
    case "pray": return renderPray();
    case "submitPrayer": return renderSubmit("prayer");
    case "submitPraise": return renderSubmit("praise");
    case "praiseWall": return renderPraiseWall();
    case "admin": return state.adminAuthed ? renderAdminDashboard() : renderAdminLogin();
    default: return renderHome();
  }
}

/* ==========================================================================
   RENDER LOOP — full re-render, with focus/scroll preserved
   ========================================================================== */

const root = document.getElementById("app");

function render() {
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;
  const scrollY = window.scrollY;

  root.innerHTML =
    '<div class="pw-shell">' +
    '<div class="pw-topline">' +
    '<span></span>' +
    '<button class="pw-theme-toggle" data-action="toggle-theme" aria-label="Toggle night mode">' +
    icon(state.theme === "light" ? "moon" : "sun", 17) +
    '</button></div>' +
    renderPage() +
    '</div>';

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
  window.scrollTo(0, scrollY);
}

/* ==========================================================================
   EVENTS — delegated click + input handlers
   ========================================================================== */

document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-action]");
  if (!t) {
    // clicking outside a report popover closes it
    if (state.openReportMenu !== null && !e.target.closest(".pw-report-pop")) {
      state.openReportMenu = null;
      render();
    }
    return;
  }
  const action = t.getAttribute("data-action");
  switch (action) {
    case "nav":
      navigate(t.getAttribute("data-page"));
      break;
    case "toggle-theme":
      toggleTheme();
      break;
    case "skip":
      pickRandomPrayer();
      render();
      break;
    case "prayed":
      markPrayed(t.getAttribute("data-id"));
      break;
    case "pray-again":
      pickRandomPrayer();
      render();
      break;
    case "submit":
      submitPost(t.getAttribute("data-type"));
      break;
    case "reset-form":
      state.submitResult[t.getAttribute("data-type")] = null;
      render();
      break;
    case "toggle-report": {
      const id = t.getAttribute("data-id");
      state.openReportMenu = state.openReportMenu === id ? null : id;
      render();
      break;
    }
    case "report":
      reportPost(t.getAttribute("data-id"), t.getAttribute("data-reason"));
      break;
    case "admin-login":
      tryAdminLogin();
      break;
    case "admin-tab":
      state.adminTab = t.getAttribute("data-tab");
      render();
      break;
    case "admin-action":
      adminAction(t.getAttribute("data-id"), t.getAttribute("data-op"));
      break;
  }
});

document.addEventListener("input", (e) => {
  const el = e.target;
  if (el.id === "admin-search-input") {
    state.adminSearch = el.value;
    render();
    return;
  }
  if (el.id === "admin-pw-input") {
    state.adminPasswordInput = el.value;
    return; // no re-render needed until submit
  }
  const bindKey = el.getAttribute && el.getAttribute("data-bind");
  if (bindKey) {
    state[bindKey] = el.value;
    // Update just the counter / disabled state without a full re-render,
    // so the textarea keeps focus and cursor position naturally.
    const type = el.id.indexOf("prayer") !== -1 ? "prayer" : "praise";
    const counterEl = document.getElementById("counter-" + type);
    if (counterEl && el.tagName === "TEXTAREA") counterEl.textContent = el.value.length + "/800";
    if (bindKey.indexOf("Body") !== -1) {
      const submitBtn = document.querySelector('[data-action="submit"][data-type="' + type + '"]');
      if (submitBtn) submitBtn.disabled = !el.value.trim();
    }
  }
});

document.addEventListener("keydown", (e) => {
  if (e.target && e.target.id === "admin-pw-input" && e.key === "Enter") tryAdminLogin();
});

/* ==========================================================================
   ROTATING BOARD TIMER
   ========================================================================== */

setInterval(() => {
  if (state.page === "home") {
    const items = boardAll();
    if (items.length > 1) {
      state.boardIndex = (state.boardIndex + 1) % items.length;
      const wrap = document.getElementById("home-board-wrap");
      if (wrap) wrap.innerHTML = rotatingBoardHtml(items, state.boardIndex, "Nothing on the wall right now.");
    }
  } else if (state.page === "praiseWall") {
    const items = activePraises();
    if (items.length > 1) {
      state.praiseBoardIndex = (state.praiseBoardIndex + 1) % items.length;
      const wrap = document.getElementById("praise-board-wrap");
      if (wrap) wrap.innerHTML = rotatingBoardHtml(items, state.praiseBoardIndex, "No praise reports yet — be the first to share one.");
    }
  }
}, ROTATE_MS);

/* ==========================================================================
   INIT
   ========================================================================== */

document.documentElement.setAttribute("data-theme", state.theme);
render();
</script>
</body>
</html>
